<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAP 산출물 검토 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EFE9;
    --border: #E2E0D8;
    --text: #1A1916;
    --text-sub: #6B6960;
    --text-hint: #A09D95;
    --accent: #2C5F2E;
    --accent-light: #EAF3DE;
    --accent-mid: #639922;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  .logo { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .subtitle { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
  }

  textarea {
    font-family: inherit;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    min-height: 200px;
    resize: vertical;
    line-height: 1.6;
  }
  textarea:focus { border-color: var(--accent-mid); }

  .btn-primary {
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    background: var(--accent);
    color: #fff;
    padding: 10px 24px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #234A25; }
  .btn-primary:disabled { background: var(--text-hint); cursor: not-allowed; }

  #results { display: none; }
  #results.show { display: block; }

  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--text-sub);
    font-size: 13px;
  }
  .loading.show { display: block; }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Score */
  .score-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .total-score {
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
  }
  .total-score span { font-size: 16px; font-weight: 400; color: var(--text-sub); }
  .score-pass { color: var(--accent); }
  .score-fail { color: var(--red); }

  .score-bar-wrap { margin-bottom: 12px; }
  .score-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 999px;
    margin: 4px 0;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.6s ease;
  }
  .bar-required { background: var(--accent-mid); }
  .bar-bonus { background: #378ADD; }

  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .score-row-label { color: var(--text-sub); }
  .score-row-val { font-weight: 500; }
  .score-note { font-size: 11px; color: var(--text-hint); margin-top: 2px; margin-bottom: 10px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  .verdict {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 1rem;
  }
  .verdict-pass { background: var(--accent-light); color: var(--accent); }
  .verdict-fail { background: var(--red-light); color: var(--red); }

  .email-box {
    background: var(--blue-light);
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 13px;
    color: #0C447C;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .bp-box {
    background: var(--amber-light);
    border-left: 3px solid var(--amber);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--amber);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .copy-btn {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-sub);
    cursor: pointer;
  }
  .copy-btn:hover { background: var(--surface2); }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 2rem;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Gen AI Playground</div>
    <h1>산출물 검토 도구</h1>
    <p class="subtitle">가이드 기준에 따라 점수를 산정하고 보완 메일과 BP 후보를 판정합니다</p>
  </header>

  <div class="card">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <div class="card-label" style="margin:0">산출물 본문 붙여넣기</div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-size:11px; color:var(--text-hint);">일관성</span>
        <input type="range" min="0" max="1" step="0.1" value="0.3" id="tempSlider"
          style="width:80px;" oninput="document.getElementById('tempVal').textContent=this.value">
        <span style="font-size:11px; color:var(--text-hint);">창의성</span>
        <span style="font-size:12px; font-weight:500; color:var(--text-sub); min-width:24px;" id="tempVal">0.3</span>
      </div>
    </div>
    <textarea id="outputText" placeholder="GAP 시스템에서 작성된 산출물 본문을 여기에 붙여넣으세요.&#10;&#10;여러 개를 한 번에 검토하려면 각 산출물 앞에 [1], [2], [3] 번호를 붙여주세요."></textarea>
    <button class="btn-primary" onclick="analyze()" id="analyzeBtn">검토 시작</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>산출물 분석 중...</div>
  </div>

  <div id="results">

    <!-- Score card -->
    <div class="card">
      <div class="card-label">점수</div>
      <div class="score-header">
        <div class="total-score" id="totalScore">0<span>/100+</span></div>
        <div id="scoreBadge"></div>
      </div>

      <div class="score-bar-wrap">
        <div class="score-row">
          <span class="score-row-label">목적/배경</span>
          <span class="score-row-val" id="purposeScore">—</span>
        </div>
        <div class="score-bar-bg"><div class="score-bar-fill bar-required" id="purposeBar" style="width:0%"></div></div>
        <div class="score-note" id="purposeNote"></div>
      </div>

      <div class="score-bar-wrap">
        <div class="score-row">
          <span class="score-row-label">GenAI 활용 내용</span>
          <span class="score-row-val" id="genaiScore">—</span>
        </div>
        <div class="score-bar-bg"><div class="score-bar-fill bar-required" id="genaiBar" style="width:0%"></div></div>
        <div class="score-note" id="genaiNote"></div>
      </div>

      <div class="score-bar-wrap">
        <div class="score-row">
          <span class="score-row-label">시사점 / Lesson's Learned</span>
          <span class="score-row-val" id="lessonsScore">—</span>
        </div>
        <div class="score-bar-bg"><div class="score-bar-fill bar-required" id="lessonsBar" style="width:0%"></div></div>
        <div class="score-note" id="lessonsNote"></div>
      </div>

      <hr class="divider">

      <div class="score-bar-wrap">
        <div class="score-row">
          <span class="score-row-label">정량적 성과 수치 <span style="color:var(--text-hint);font-size:11px">보너스</span></span>
          <span class="score-row-val" id="quantScore">—</span>
        </div>
        <div class="score-bar-bg"><div class="score-bar-fill bar-bonus" id="quantBar" style="width:0%"></div></div>
        <div class="score-note" id="quantNote"></div>
      </div>

      <div class="score-bar-wrap">
        <div class="score-row">
          <span class="score-row-label">첨부파일 <span style="color:var(--text-hint);font-size:11px">보너스</span></span>
          <span class="score-row-val" id="attachScore">—</span>
        </div>
        <div class="score-bar-bg"><div class="score-bar-fill bar-bonus" id="attachBar" style="width:0%"></div></div>
        <div class="score-note" id="attachNote"></div>
      </div>
    </div>

    <!-- Verdict -->
    <div id="verdictBox"></div>

    <!-- Email -->
    <div class="card" id="emailSection" style="display:none">
      <div class="section-head">
        <div class="card-label" style="margin:0">보완 안내 메일 초안</div>
        <button class="copy-btn" onclick="copyEmail()">복사</button>
      </div>
      <div class="email-box" id="emailContent"></div>
    </div>

    <!-- BP -->
    <div class="card">
      <div class="card-label">BP 후보 판단</div>
      <div class="bp-box" id="bpContent"></div>
    </div>

  </div>

  <footer>GAP 산출물 가이드 기준 v2</footer>
</div>

<script>
  const WORKER_URL = 'https://gap-reviewer.yuli87-k.workers.dev/';

  async function analyze() {
    const text = document.getElementById('outputText').value.trim();
    if (!text) { alert('산출물 본문을 붙여넣어주세요.'); return; }
    if (WORKER_URL.includes('여기에')) { alert('WORKER_URL을 수정해주세요.'); return; }

    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('loading').classList.add('show');
    document.getElementById('results').classList.remove('show');

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          prompt: `다음 산출물을 검토해주세요:\n\n${text}`,
          temperature: parseFloat(document.getElementById('tempSlider').value)
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || '오류 발생');

      const raw = data.choices[0].message.content.replace(/```json|```/g, '').trim();
      const result = JSON.parse(raw);
      renderResults(result);

    } catch (e) {
      alert('오류: ' + e.message);
    } finally {
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('loading').classList.remove('show');
    }
  }

  function renderResults(r) {
    const s = r.scores;
    const total = r.total;

    // Total score
    const scoreEl = document.getElementById('totalScore');
    scoreEl.innerHTML = `${total}<span>/100+</span>`;
    scoreEl.className = 'total-score ' + (r.verdict === 'pass' ? 'score-pass' : 'score-fail');

    // Score rows
    setScore('purpose', s.purpose.score, s.purpose.max, s.purpose.reason, false);
    setScore('genai', s.genai.score, s.genai.max, s.genai.reason, false, s.genai.penalty);
    setScore('lessons', s.lessons.score, s.lessons.max, s.lessons.reason, false);
    setScore('quant', s.quantitative.bonus, s.quantitative.max, s.quantitative.reason, true);
    setScore('attach', s.attachment.bonus, s.attachment.max, s.attachment.reason, true);

    // Verdict
    const vBox = document.getElementById('verdictBox');
    vBox.innerHTML = r.verdict === 'pass'
      ? `<div class="verdict verdict-pass">✓ 통과 — ${r.verdict_reason}</div>`
      : `<div class="verdict verdict-fail">✗ 보완 필요 — ${r.verdict_reason}</div>`;

    // Email
    const emailSec = document.getElementById('emailSection');
    if (r.needs_revision && r.email) {
      emailSec.style.display = 'block';
      document.getElementById('emailContent').textContent = r.email;
    } else {
      emailSec.style.display = 'none';
    }

    // BP
    document.getElementById('bpContent').textContent = r.bp_judgment;

    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function setScore(key, score, max, note, isBonus, isPenalty) {
    const prefix = isBonus ? key === 'quant' ? 'quant' : 'attach' : key;
    const scoreLabel = isPenalty ? `${score}점 ⚠️ 패널티` : `${score} / ${max}점`;
    document.getElementById(prefix + 'Score').textContent = scoreLabel;
    document.getElementById(prefix + 'Score').style.color = isPenalty ? 'var(--red)' : '';
    document.getElementById(prefix + 'Bar').style.width = isPenalty ? '100%' : `${(score / max) * 100}%`;
    document.getElementById(prefix + 'Bar').style.background = isPenalty ? 'var(--red)' : '';
    document.getElementById(prefix + 'Note').textContent = note;
  }

  function copyEmail() {
    const text = document.getElementById('emailContent').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '복사됨 ✓';
      setTimeout(() => btn.textContent = '복사', 1500);
    });
  }
</script>
</body>
</html>
