<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAP 산출물 검토 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EFE9;
    --border: #E2E0D8;
    --text: #1A1916;
    --text-sub: #6B6960;
    --text-hint: #A09D95;
    --accent: #2C5F2E;
    --accent-light: #EAF3DE;
    --accent-mid: #639922;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  .logo { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .subtitle { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  input[type="password"], input[type="text"], textarea {
    font-family: inherit;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus, input[type="text"]:focus, textarea:focus {
    border-color: var(--accent-mid);
  }

  #apiKeyInput { flex: 1; }

  textarea {
    width: 100%;
    min-height: 200px;
    resize: vertical;
    line-height: 1.6;
  }

  .btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-save {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }
  .btn-save:hover { background: var(--border); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 10px 24px;
    font-size: 14px;
    width: 100%;
    margin-top: 4px;
  }
  .btn-primary:hover { background: #234A25; }
  .btn-primary:disabled { background: var(--text-hint); cursor: not-allowed; }

  .saved-indicator {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--accent-mid);
    font-weight: 500;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mid); }

  #results { display: none; }
  #results.show { display: block; }

  .checklist-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .checklist-table tr { border-bottom: 1px solid var(--border); }
  .checklist-table tr:last-child { border-bottom: none; }
  .checklist-table td { padding: 8px 4px; vertical-align: middle; }
  .checklist-table td:first-child { color: var(--text-sub); width: 60%; }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 999px;
  }
  .badge-pass { background: #C0DD97; color: #27500A; }
  .badge-fail { background: #F7C1C1; color: #791F1F; }
  .badge-warn { background: #FAC775; color: #633806; }

  .verdict {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 1rem;
  }
  .verdict-pass { background: var(--accent-light); color: var(--accent); }
  .verdict-fail { background: var(--red-light); color: var(--red); }

  .email-box {
    background: var(--blue-light);
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 13px;
    color: #0C447C;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .bp-box {
    background: var(--amber-light);
    border-left: 3px solid var(--amber);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--amber);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--text-sub);
    font-size: 13px;
  }
  .loading.show { display: block; }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .copy-btn {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-sub);
    cursor: pointer;
    float: right;
    margin-top: -2px;
  }
  .copy-btn:hover { background: var(--surface2); }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .hint { font-size: 11px; color: var(--text-hint); margin-top: 8px; }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 2rem;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Gen AI Playground</div>
    <h1>산출물 검토 도구</h1>
    <p class="subtitle">가이드 기준에 따라 통과 여부, 보완 메일, BP 후보를 자동 판정합니다</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <div class="card-label">OpenAI API 키</div>
    <div class="input-row">
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
      <button class="btn btn-save" onclick="saveKey()">저장</button>
      <span id="keySaved" class="saved-indicator" style="display:none"><span class="dot"></span>저장됨</span>
    </div>
    <p class="hint">키는 이 브라우저에만 저장되며 외부로 전송되지 않습니다.</p>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-label">산출물 본문 붙여넣기</div>
    <textarea id="outputText" placeholder="GAP 시스템에서 작성된 산출물 본문을 여기에 붙여넣으세요.&#10;&#10;여러 개를 한 번에 검토하려면 각 산출물 앞에 [1], [2], [3] 번호를 붙여주세요."></textarea>
    <button class="btn btn-primary" onclick="analyze()" id="analyzeBtn">검토 시작</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>산출물 분석 중...</div>
  </div>

  <!-- Results -->
  <div id="results">

    <div class="card">
      <div class="card-label">체크리스트 판정</div>
      <table class="checklist-table" id="checklistTable"></table>
    </div>

    <div id="verdictBox"></div>

    <div class="card" id="emailSection" style="display:none">
      <div class="section-head">
        <div class="card-label" style="margin:0">보완 안내 메일 초안</div>
        <button class="copy-btn" onclick="copyEmail()">복사</button>
      </div>
      <div class="email-box" id="emailContent"></div>
    </div>

    <div class="card">
      <div class="card-label">BP 후보 판단</div>
      <div class="bp-box" id="bpContent"></div>
    </div>

  </div>

  <footer>GAP 산출물 가이드 기준 v1</footer>
</div>

<script>
  // ⚠️ 여기에 Cloudflare Worker URL을 붙여넣으세요
  const WORKER_URL = 'https://gap-reviewer.yuli87-k.workers.dev/';

  window.onload = () => {
    const saved = localStorage.getItem('gap_api_key');
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
      document.getElementById('keySaved').style.display = 'inline-flex';
    }
  };

  function saveKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    localStorage.setItem('gap_api_key', key);
    document.getElementById('keySaved').style.display = 'inline-flex';
  }

  async function analyze() {
    const key = localStorage.getItem('gap_api_key') || document.getElementById('apiKeyInput').value.trim();
    const text = document.getElementById('outputText').value.trim();

    if (!key) { alert('API 키를 먼저 입력해주세요.'); return; }
    if (!text) { alert('산출물 본문을 붙여넣어주세요.'); return; }
    if (WORKER_URL.includes('여기에')) { alert('worker.js를 배포하고 WORKER_URL을 수정해주세요.'); return; }

    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('loading').classList.add('show');
    document.getElementById('results').classList.remove('show');

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          apiKey: key,
          prompt: `다음 산출물을 검토해주세요:\n\n${text}`
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || '오류 발생');

      const raw = data.choices[0].message.content.replace(/```json|```/g, '').trim();
      const result = JSON.parse(raw);
      renderResults(result);

    } catch (e) {
      alert('오류: ' + e.message);
    } finally {
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('loading').classList.remove('show');
    }
  }

  function renderResults(r) {
    const table = document.getElementById('checklistTable');
    table.innerHTML = r.checklist.map(c => {
      const cls = c.status === 'pass' ? 'badge-pass' : c.status === 'fail' ? 'badge-fail' : 'badge-warn';
      const label = c.status === 'pass' ? '통과' : c.status === 'fail' ? '미통과' : '미흡';
      const note = c.note ? `<span style="font-size:11px;color:var(--text-hint);margin-left:6px;">${c.note}</span>` : '';
      return `<tr><td>${c.item}${note}</td><td style="text-align:right"><span class="badge ${cls}">${label}</span></td></tr>`;
    }).join('');

    const vBox = document.getElementById('verdictBox');
    vBox.innerHTML = r.verdict === 'pass'
      ? `<div class="verdict verdict-pass">✓ 통과 — ${r.verdict_reason}</div>`
      : `<div class="verdict verdict-fail">✗ 보완 필요 — ${r.verdict_reason}</div>`;

    const emailSec = document.getElementById('emailSection');
    if (r.needs_revision && r.email) {
      emailSec.style.display = 'block';
      document.getElementById('emailContent').textContent = r.email;
    } else {
      emailSec.style.display = 'none';
    }

    document.getElementById('bpContent').textContent = r.bp_judgment;
    document.getElementById('results').classList.add('show');
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyEmail() {
    const text = document.getElementById('emailContent').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '복사됨 ✓';
      setTimeout(() => btn.textContent = '복사', 1500);
    });
  }
</script>
</body>
</html>
