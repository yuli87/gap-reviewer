<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAP 산출물 검토 도구</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface2: #F0EFE9;
    --border: #E2E0D8;
    --text: #1A1916;
    --text-sub: #6B6960;
    --text-hint: #A09D95;
    --accent: #2C5F2E;
    --accent-light: #EAF3DE;
    --accent-mid: #639922;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --amber: #854F0B;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  .logo { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--text-hint); text-transform: uppercase; margin-bottom: 6px; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
  .subtitle { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-hint);
    margin-bottom: 10px;
  }

  .api-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  input[type="password"], input[type="text"], textarea {
    font-family: inherit;
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus, input[type="text"]:focus, textarea:focus {
    border-color: var(--accent-mid);
  }

  #apiKeyInput { flex: 1; }

  textarea {
    width: 100%;
    min-height: 200px;
    resize: vertical;
    line-height: 1.6;
  }

  .btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-save {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }
  .btn-save:hover { background: var(--border); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    padding: 10px 24px;
    font-size: 14px;
    width: 100%;
    margin-top: 4px;
  }
  .btn-primary:hover { background: #234A25; }
  .btn-primary:disabled { background: var(--text-hint); cursor: not-allowed; }

  .api-saved {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--accent-mid);
    font-weight: 500;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mid); }

  /* results */
  #results { display: none; }
  #results.show { display: block; }

  .result-section { margin-bottom: 1rem; }

  .checklist-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .checklist-table tr { border-bottom: 1px solid var(--border); }
  .checklist-table tr:last-child { border-bottom: none; }
  .checklist-table td { padding: 8px 4px; vertical-align: middle; }
  .checklist-table td:first-child { color: var(--text-sub); width: 60%; }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 999px;
  }
  .badge-pass { background: #C0DD97; color: #27500A; }
  .badge-fail { background: #F7C1C1; color: #791F1F; }
  .badge-warn { background: #FAC775; color: #633806; }

  .verdict {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
  }
  .verdict-pass { background: var(--accent-light); color: var(--accent); }
  .verdict-fail { background: var(--red-light); color: var(--red); }

  .email-box {
    background: var(--blue-light);
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 13px;
    color: #0C447C;
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .bp-box {
    background: var(--amber-light);
    border-left: 3px solid var(--amber);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--amber);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--text-sub);
    font-size: 13px;
  }
  .loading.show { display: block; }

  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .copy-btn {
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-sub);
    cursor: pointer;
    float: right;
    margin-top: -2px;
  }
  .copy-btn:hover { background: var(--surface2); }

  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-hint);
    margin-top: 2rem;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">Gen AI Playground</div>
    <h1>산출물 검토 도구</h1>
    <p class="subtitle">가이드 기준에 따라 통과 여부, 보완 메일, BP 후보를 자동 판정합니다</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <div class="card-label">Anthropic API 키</div>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="sk-..." />
      <button class="btn btn-save" onclick="saveKey()">저장</button>
      <span id="keySaved" class="api-saved" style="display:none"><span class="dot"></span>저장됨</span>
    </div>
    <p style="font-size:11px; color:var(--text-hint); margin-top:8px;">
      키는 이 브라우저에만 저장되며 외부로 전송되지 않습니다. 
      <a href="https://platform.openai.com/api-keys" target="_blank" style="color:var(--blue);">platform.openai.com/api-keys</a>에서 발급
    </p>
  </div>

  <!-- Input -->
  <div class="card">
    <div class="card-label">산출물 본문 붙여넣기</div>
    <textarea id="outputText" placeholder="GAP 시스템에서 작성된 산출물 본문을 여기에 붙여넣으세요.&#10;&#10;여러 개를 한 번에 검토하려면 각 산출물 앞에 [1], [2], [3] 번호를 붙여주세요."></textarea>
    <button class="btn btn-primary" onclick="analyze()" id="analyzeBtn">검토 시작</button>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>산출물 분석 중...</div>
  </div>

  <!-- Results -->
  <div id="results">

    <!-- Checklist -->
    <div class="card result-section">
      <div class="card-label">체크리스트 판정</div>
      <table class="checklist-table" id="checklistTable"></table>
    </div>

    <!-- Verdict -->
    <div id="verdictBox" style="margin-bottom:1rem;"></div>

    <!-- Email -->
    <div class="card result-section" id="emailSection" style="display:none">
      <div class="section-head">
        <div class="card-label" style="margin:0">보완 안내 메일 초안</div>
        <button class="copy-btn" onclick="copyEmail()">복사</button>
      </div>
      <div class="email-box" id="emailContent"></div>
    </div>

    <!-- BP -->
    <div class="card result-section">
      <div class="card-label">BP 후보 판단</div>
      <div class="bp-box" id="bpContent"></div>
    </div>

  </div>

  <footer>GAP 산출물 가이드 기준 v1 · 율리님 전용</footer>
</div>

<script>
const SYSTEM_PROMPT = `당신은 Gen AI Playground(GAP) 운영자입니다. 사용자가 제출한 산출물을 가이드 기준에 따라 검토합니다.

## 가이드 체크리스트 (각 항목을 판정하세요)
1. 제목 100자 이내 여부
2. 본문 700자 이상 여부
3. [목적/배경] 항목 포함 여부 (문제 상황, 과제 정의, 배경 맥락)
4. [GenAI 활용 내용] 항목 포함 여부 (사용 서비스명, 구체적인 활용 방법, 수행 과정)
5. [시사점/Lesson's Learned/향후 계획] 항목 포함 여부
6. 정량적 성과 수치 포함 여부 (시간 절약, %, 건수 등)
7. 첨부파일 언급 여부

## BP 후보 기준
- 정량 수치 있음 + 재현 가능한 구체성 + GenAI 활용이 명확하면 BP 후보
- 보완 후 BP 가능한 경우도 명시

## 출력 형식 (반드시 이 JSON 형식으로만 응답)
{
  "checklist": [
    {"item": "제목 100자 이내", "status": "pass|fail|warn", "note": "간단한 설명"},
    {"item": "본문 700자 이상", "status": "pass|fail|warn", "note": ""},
    {"item": "목적/배경 포함", "status": "pass|fail|warn", "note": ""},
    {"item": "GenAI 활용 내용 포함", "status": "pass|fail|warn", "note": ""},
    {"item": "시사점/Lesson's Learned 포함", "status": "pass|fail|warn", "note": ""},
    {"item": "정량적 성과 수치", "status": "pass|fail|warn", "note": ""},
    {"item": "첨부파일 언급", "status": "pass|fail|warn", "note": ""}
  ],
  "verdict": "pass|fail",
  "verdict_reason": "종합 판정 이유 한 줄",
  "needs_revision": true|false,
  "email": "보완 필요 시 메일 본문 전체 (불필요 시 빈 문자열). 수신자 이름은 OOO님으로.",
  "bp_judgment": "BP 후보 여부와 이유. 구체적으로."
}

JSON 외 다른 텍스트는 절대 출력하지 마세요.`;

window.onload = () => {
  const saved = localStorage.getItem('gap_api_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('keySaved').style.display = 'inline-flex';
  }
};

function saveKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  localStorage.setItem('gap_api_key', key);
  document.getElementById('keySaved').style.display = 'inline-flex';
}

async function analyze() {
  const key = localStorage.getItem('gap_api_key') || document.getElementById('apiKeyInput').value.trim();
  const text = document.getElementById('outputText').value.trim();

  if (!key) { alert('API 키를 먼저 입력해주세요.'); return; }
  if (!text) { alert('산출물 본문을 붙여넣어주세요.'); return; }

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('results').classList.remove('show');

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + key
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 1500,
        messages: [
          { role: 'system', content: SYSTEM_PROMPT },
          { role: 'user', content: `다음 산출물을 검토해주세요:\n\n${text}` }
        ]
      })
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '오류 발생');

    const raw = data.choices[0].message.content.replace(/```json|```/g, '').trim();
    const result = JSON.parse(raw);
    renderResults(result);

  } catch (e) {
    alert('오류: ' + e.message);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

function renderResults(r) {
  // checklist
  const table = document.getElementById('checklistTable');
  table.innerHTML = r.checklist.map(c => {
    const badgeClass = c.status === 'pass' ? 'badge-pass' : c.status === 'fail' ? 'badge-fail' : 'badge-warn';
    const badgeText = c.status === 'pass' ? '통과' : c.status === 'fail' ? '미통과' : '미흡';
    const note = c.note ? `<span style="font-size:11px;color:var(--text-hint);margin-left:6px;">${c.note}</span>` : '';
    return `<tr><td>${c.item}${note}</td><td style="text-align:right"><span class="badge ${badgeClass}">${badgeText}</span></td></tr>`;
  }).join('');

  // verdict
  const vBox = document.getElementById('verdictBox');
  if (r.verdict === 'pass') {
    vBox.innerHTML = `<div class="verdict verdict-pass">✓ 통과 — ${r.verdict_reason}</div>`;
  } else {
    vBox.innerHTML = `<div class="verdict verdict-fail">✗ 보완 필요 — ${r.verdict_reason}</div>`;
  }

  // email
  const emailSec = document.getElementById('emailSection');
  if (r.needs_revision && r.email) {
    emailSec.style.display = 'block';
    document.getElementById('emailContent').textContent = r.email;
  } else {
    emailSec.style.display = 'none';
  }

  // bp
  document.getElementById('bpContent').textContent = r.bp_judgment;

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyEmail() {
  const text = document.getElementById('emailContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '복사됨 ✓';
    setTimeout(() => btn.textContent = '복사', 1500);
  });
}
</script>
</body>
</html>
